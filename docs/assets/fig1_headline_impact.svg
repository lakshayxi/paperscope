<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 190" width="900" height="190" role="img" aria-label="Generic versus PaperScope on rating MAE, decision accuracy, and false accepts">
  <rect x="0" y="0" width="900" height="190" fill="#fcfcfb"/>
  
  <g>
    <text x="4" y="24" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0b0b0b">Rating MAE (lower is better)</text>
    <text x="4" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#898781">50 rating-eligible forums</text>
    
    <text x="4" y="58" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">Generic</text>
    <rect x="4" y="66" width="170" height="22" fill="#e1e0d9" rx="3"/>
    <rect x="4" y="66" width="140.9" height="22" fill="#2a78d6" rx="3"/>
    <text x="184" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0b0b0b">1.33</text>
    
    <text x="4" y="106" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">PaperScope</text>
    <rect x="4" y="114" width="170" height="22" fill="#e1e0d9" rx="3"/>
    <rect x="4" y="114" width="110.2" height="22" fill="#eb6834" rx="3"/>
    <text x="184" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0b0b0b">1.04</text>
    <text x="89.0" y="160" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#006300">−21.8%</text>
  </g>
  
  <g>
    <text x="304" y="24" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0b0b0b">Decision accuracy (higher is better)</text>
    <text x="304" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#898781">35 resolved decisions</text>
    
    <text x="304" y="58" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">Generic</text>
    <rect x="304" y="66" width="170" height="22" fill="#e1e0d9" rx="3"/>
    <rect x="304" y="66" width="106.9" height="22" fill="#2a78d6" rx="3"/>
    <text x="484" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0b0b0b">62.9%</text>
    
    <text x="304" y="106" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">PaperScope</text>
    <rect x="304" y="114" width="170" height="22" fill="#e1e0d9" rx="3"/>
    <rect x="304" y="114" width="131.1" height="22" fill="#eb6834" rx="3"/>
    <text x="484" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0b0b0b">77.1%</text>
    <text x="389.0" y="160" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#006300">+14.3 pp</text>
  </g>
  
  <g>
    <text x="604" y="24" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0b0b0b">False accepts (fewer is better)</text>
    <text x="604" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" fill="#898781">35 resolved decisions</text>
    
    <text x="604" y="58" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">Generic</text>
    <rect x="604" y="66" width="170" height="22" fill="#e1e0d9" rx="3"/>
    <rect x="604" y="66" width="153.0" height="22" fill="#2a78d6" rx="3"/>
    <text x="784" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0b0b0b">9</text>
    
    <text x="604" y="106" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#52514e">PaperScope</text>
    <rect x="604" y="114" width="170" height="22" fill="#e1e0d9" rx="3"/>
    <rect x="604" y="114" width="34.0" height="22" fill="#eb6834" rx="3"/>
    <text x="784" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0b0b0b">2</text>
    <text x="689.0" y="160" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#006300">−7</text>
  </g>
  <line x1="300" y1="16" x2="300" y2="170" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="600" y1="16" x2="600" y2="170" stroke="#e1e0d9" stroke-width="1"/>
</svg>
